name: reuseable-pipeline

on:
  workflow_call:
   
    inputs:
      app_name:
        type: string
        required: true
      environment:
        type: string
        required: true
        default: staging 

    secrets:
      docker_token:
        required: true

jobs:
  reuseable-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: print 
        run: echo "Building ${{ inputs.app_name }} for environment  ${{ inputs.environment }}"

      - name: print docker token
        run: |
          if: [ -n "${{ secrets.docker_token }}" ]; then
            echo "Docker token is set':' true"
          else:
            echo "Docker token is set':' false"
          fi
