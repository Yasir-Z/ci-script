name: reuseable-pipeline

on:
  workflow_call:
   
    inputs:
      app_name:
        type: string
        required: true
      environment:
        type: string
        required: ture
        default: staging 

    secrets:
      docker_token:
        required: true

jobs:
  reuseable-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: print 
        run: echo "Building ${{ env.APP_NAME }} for environment  $GITHUB_ENV"

      - name: print docker token
        run: echo "Docker token is set':' true"
