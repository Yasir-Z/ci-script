name: js-pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: buld and tag image
        run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/app-js:v1 .

      - name: docker push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app-js:v1
      
