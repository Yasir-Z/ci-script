name: ci-image-build

on:
  push:
    branches:
      - main

jobs:
  ci-image:
    runs-on: ubuntu-latest
    steps:
      - name: check the code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

