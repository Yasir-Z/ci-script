name: reuseable-pipeline

on:
  workflow_call:
   
    inputs:
      app_name:
        type: string
        required: true
      environment:
        type: string
        required: true
        default: staging 

    secrets:
      docker_token:
        required: true

    outputs:
      build_version:
        value: ${{ jobs.reuseable-pipeline.outputs.build_version }}

jobs:
  reuseable-pipeline:
    runs-on: ubuntu-latest
   
    outputs:
      build_version: ${{ steps.generate_version.outputs.version }}
    
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: print 
        run: echo "Building ${{ inputs.app_name }} for environment  ${{ inputs.environment }}"

      - name: print docker token
        run: |
          if [ -n "${{ secrets.docker_token }}" ]; then
            echo "Docker token is set':' true"
          else
            echo "Docker token is set':' false"
          fi

      - name: generate version
        id: generate_version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=v1.0-$SHORT_SHA" >> "$GITHUB_OUTPUT"
