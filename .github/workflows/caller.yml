name: call-pipeline

on:
  push:
    branches:
      - main

jobs:
  call-build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app_name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  read-outputs:
    needs: call-build
    runs-on: ubuntu-latest
    steps:
      - name: print outputs
        run: echo "build_version: ${{ needs.call-build.outputs.build_version }}"
