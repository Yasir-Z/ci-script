#workflow start here 
name: check-pr

on:
  pull_request:
  

jobs:
  file-size-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: fail if size is more than 1MB
        uses: Fails if any file in the PR is larger than 1 MB
        with:
          max_file_size_kib: '1000'
